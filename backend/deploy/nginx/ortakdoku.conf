# Ortak Doku (printy) — nginx reverse proxy
# Kurulum:
#   sudo cp backend/deploy/nginx/ortakdoku.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/ortakdoku.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS sertifikaları certbot ile alınır (bkz SUNUCU-PROD-KURULUM.md §7).
# NOT: certbot --nginx, 80→443 yönlendirmesini ve ssl_certificate satırlarını
#      kendisi ekler. Aşağısı manuel referans/temel iskelettir.

# WebSocket upgrade map (ileride harita/canlı aktivite için)
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ── API: api.ortakdoku.com → NestJS :3001 ───────────────────────
server {
  listen 80;
  server_name api.ortakdoku.com;
  # certbot bunu otomatik 443'e çevirir
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl http2;
  server_name api.ortakdoku.com;

  # certbot dolduracak:
  # ssl_certificate     /etc/letsencrypt/live/api.ortakdoku.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/api.ortakdoku.com/privkey.pem;

  # Büyük dosyalar R2'ye presigned gider; API gövdesi küçük. Yine de pay bırak:
  client_max_body_size 25m;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
  }
}

# ── Frontend + tenant subdomain'leri → Next.js :3000 (SONRA) ─────
# Frontend devreye girince aç. Tenant çözümleme Host başlığından yapılır
# (TenantMiddleware subdomain'i okur).
server {
  listen 80;
  server_name app.ortakdoku.com *.ortakdoku.com;
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl http2;
  server_name app.ortakdoku.com *.ortakdoku.com;

  # Tekil app sertifikası certbot --nginx ile; wildcard için DNS-01:
  # ssl_certificate     /etc/letsencrypt/live/ortakdoku.com/fullchain.pem;   # *.ortakdoku.com
  # ssl_certificate_key /etc/letsencrypt/live/ortakdoku.com/privkey.pem;

  location / {
    # Frontend kurulana kadar 503 / bakım. Next.js gelince :3000'e proxy_pass:
    # proxy_pass http://127.0.0.1:3000;
    return 503;
  }
}
